    <div class="sidebar-section">

    </div>

      <div class="sidebar-section-label" data-i18n="nav.system">系統</div>

      <a href="../index.html" target="_blank" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span data-i18n="nav.preview">前台預覽</span></a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-avatar">A</div><div><div class="sidebar-user-name">admin</div><div class="sidebar-user-role" data-i18n="user.role.admin">管理員</div></div></div>
      <button class="btn-logout" data-i18n="btn.logout">登出</button>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-breadcrumb"><a href="dashboard.html" data-i18n="common.home">首頁</a><span>/</span><span style="color:var(--text)" data-i18n="nav.map">地圖資料點</span></div>
      <div class="topbar-actions">
        <a href="../projects/stray-aid-map.html" target="_blank" class="btn btn--outline btn--sm">Stray Aid Map</a>
        <button class="btn btn--primary btn--sm" id="btn-new-loc">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="map.new">新增資料點</span>
        </button>
      </div>
    </div>

    <div class="admin-content">
      <div class="stats-grid" id="loc-stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.25rem"></div>

      <div class="panel">
        <div class="panel__header">
          <div class="panel__title" data-i18n="map.title">所有資料點</div>
          <div class="panel__toolbar">
            <div class="search-input">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="search-locs" data-i18n-ph="map.search.ph" placeholder="搜尋名稱、地址…" />
            </div>
            <select class="select-input" id="filter-loctype">
              <option value="" data-i18n="map.filter.type">所有類型</option>
              <option value="shelter" data-i18n="map.type.shelter">收容所</option>
              <option value="vet" data-i18n="map.type.vet">動物醫院</option>
              <option value="feed" data-i18n="map.type.feed">餵食點</option>
              <option value="rescue" data-i18n="map.type.rescue">救援站</option>
            </select>
            <select class="select-input" id="filter-locstatus">
              <option value="">—</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="map.col.name">名稱</th>
                <th data-i18n="map.col.type">類型</th>
                <th data-i18n="map.f.address">地址</th>
                <th data-i18n="map.f.phone">電話</th>
                <th data-i18n="map.col.coord">座標</th>
                <th>Photos</th>
                <th>Status</th>
                <th style="text-align:right" data-i18n="map.col.actions">操作</th>
              </tr>
            </thead>
            <tbody id="locs-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <div id="locs-count" style="color:var(--text-3);font-size:.75rem"></div>
          <div class="pagination__pages" id="locs-pages"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="loc-modal">
  <div class="modal modal--lg">
    <div class="modal__header">
      <div class="modal__title" id="loc-modal-title" data-i18n="map.new">新增資料點</div>
      <button class="modal__close" data-close-modal>✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="loc-id" />
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="map.f.name">名稱 *</label>
          <input class="field-input" id="l-name" placeholder="臺北市動物之家" required />
        </div>
        <div class="field">
          <label class="field-label">Name (EN)</label>
          <input class="field-input" id="l-name-en" placeholder="Taipei Animal Shelter" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="map.f.type">類型 *</label>
          <select class="field-select" id="l-type">
            <option value="">—</option>
            <option value="shelter" data-i18n="map.type.shelter">收容所</option>
            <option value="vet" data-i18n="map.type.vet">動物醫院</option>
            <option value="feed" data-i18n="map.type.feed">餵食點</option>
            <option value="rescue" data-i18n="map.type.rescue">救援站</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Status</label>
          <select class="field-select" id="l-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="map.f.address">地址</label>
        <input class="field-input" id="l-address" placeholder="台北市北投區立農街二段350號" />
      </div>
      <div class="field">
        <label class="field-label">Address (EN)</label>
        <input class="field-input" id="l-address-en" placeholder="350 Linong St. Sec.2, Beitou, Taipei" />
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="map.f.phone">電話</label>
          <input class="field-input" id="l-phone" placeholder="02-2858-3700" />
        </div>
        <div class="field">
          <select class="field-select" id="l-status2" style="display:none"></select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Hours (中)</label>
        <input class="field-input" id="l-hours" placeholder="週二–週日 09:00–17:00" />
      </div>
      <div class="field">
        <label class="field-label">Hours (EN)</label>
        <input class="field-input" id="l-hours-en" placeholder="Tue–Sun 09:00–17:00" />
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="map.f.lat">緯度</label>
          <input class="field-input" id="l-lat" placeholder="25.1306" oninput="updatePreviewMap()" />
        </div>
        <div class="field">
          <label class="field-label" data-i18n="map.f.lng">經度</label>
          <input class="field-input" id="l-lng" placeholder="121.4984" oninput="updatePreviewMap()" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Map preview</label>
        <div id="preview-map"></div>
        <div class="field-hint">→ <a href="https://www.google.com/maps" target="_blank" style="color:var(--accent)">Google Maps</a></div>
      </div>

      <div class="field">
        <label class="field-label" data-i18n="map.f.photos">照片</label>
        <div class="photo-upload-section">
          <div class="photo-gallery" id="loc-photo-gallery"></div>
        </div>
        <input type="file" id="loc-photo-input" accept="image/*" multiple style="display:none" />
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--outline" data-close-modal data-i18n="btn.cancel">取消</button>
      <button class="btn btn--primary" id="btn-save-loc" data-i18n="btn.save">儲存</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js?v=4"></script>
<script>
const TYPE_BADGE  = { shelter:'badge--shelter', vet:'badge--vet', feed:'badge--feed', rescue:'badge--rescue' };
const TYPE_COLOR  = { shelter:'#2ECAD4', vet:'#7fb285', feed:'#c9a96e', rescue:'#e07070' };
const TYPE_ICON   = { shelter:'🏠', vet:'🏥', feed:'🍽️', rescue:'🚑' };

let allLocs = [], filteredLocs = [];
const PAGE_SIZE = 10;
let currentPage = 1;
let previewMap, previewMarker;
let locPhotos = [];
const MAX_LOC_PHOTOS = 6;

function getTypeLabels() {
  return {
    shelter: t('map.type.shelter'),
    vet: t('map.type.vet'),
    feed: t('map.type.feed'),
    rescue: t('map.type.rescue'),
  };
}

function renderLocPhotos() {
  const gallery = document.getElementById('loc-photo-gallery');
  if (!gallery) return;
  let html = locPhotos.map((src, i) => `
    <div class="photo-thumb">
      <img src="${src}" alt="photo ${i+1}">
      <button class="photo-thumb__del" onclick="removeLocPhoto(${i})">✕</button>
    </div>`).join('');
  if (locPhotos.length < MAX_LOC_PHOTOS) {
    html += `
      <div class="photo-add-tile" id="photo-add-tile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ${t('btn.upload')}
      </div>`;
  }
  gallery.innerHTML = html;
  const tile = document.getElementById('photo-add-tile');
  if (tile) tile.addEventListener('click', () => document.getElementById('loc-photo-input').click());
}

function removeLocPhoto(idx) {
  locPhotos.splice(idx, 1);
  renderLocPhotos();
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('loc-photo-input');
  input.addEventListener('change', async () => {
    const files = [...input.files].slice(0, MAX_LOC_PHOTOS - locPhotos.length);
    for (const f of files) {
      const url = await uploadToMedia(f, 'map_locations', { maxW: 900, maxH: 675, quality: 0.82 });
      if (url) locPhotos.push(url);
    }
    input.value = '';
    renderLocPhotos();
  });
});

function renderStats() {
  const labels = getTypeLabels();
  const counts = { shelter:0, vet:0, feed:0, rescue:0 };
  allLocs.forEach(l => { if (counts[l.type] !== undefined) counts[l.type]++; });
  document.getElementById('loc-stats').innerHTML = Object.entries(counts).map(([type, n]) => `
    <div class="stat-card">
      <div class="stat-card__icon">${TYPE_ICON[type]}</div>
      <div class="stat-card__value">${n}</div>
      <div class="stat-card__label">${labels[type]}</div>
    </div>`).join('');
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredLocs.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('locs-tbody');
  const labels = getTypeLabels();
  const tEdit = t('btn.edit');
  const tDel = t('btn.delete');

  if (filteredLocs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="empty-state__icon">📍</div><div class="empty-state__title">—</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = page.map(l => `
    <tr>
      <td class="td-name">${l.name}</td>
      <td>${l.type ? `<span class="badge ${TYPE_BADGE[l.type]||'badge--gray'}">${labels[l.type]||l.type}</span>` : '—'}</td>
      <td style="font-size:.78rem;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.address || '—'}</td>
      <td class="td-mono">${l.phone || '—'}</td>
      <td class="td-mono" style="font-size:.7rem;color:var(--text-3)">${l.lat && l.lng ? `${l.lat}, ${l.lng}` : '—'}</td>
      <td>
        ${l.photos && l.photos.length
          ? `<span class="photo-count-badge">📷 ${l.photos.length}</span>`
          : `<span style="color:var(--text-3);font-size:.72rem">—</span>`}
      </td>
      <td><span class="badge ${l.status==='active'?'badge--green':'badge--gray'}">${l.status||'—'}</span></td>
      <td><div class="td-actions">
        <button class="btn btn--ghost btn--sm" onclick="editLoc('${l.id}')">${tEdit}</button>
        <button class="btn btn--danger-ghost btn--sm" onclick="deleteLoc('${l.id}')">${tDel}</button>
      </div></td>
    </tr>`).join('');

  document.getElementById('locs-count').textContent = `${filteredLocs.length}`;
  const total = Math.ceil(filteredLocs.length / PAGE_SIZE);
  document.getElementById('locs-pages').innerHTML = total <= 1 ? '' :
    Array.from({length:total},(_,i)=>`<button class="page-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}

function goPage(n) { currentPage = n; renderTable(); }

function applyFilter() {
  const q  = document.getElementById('search-locs').value.trim().toLowerCase();
  const tp = document.getElementById('filter-loctype').value;
  const st = document.getElementById('filter-locstatus').value;
  filteredLocs = allLocs.filter(l => {
    const text = !q || [l.name, l.name_en, l.address].some(f => (f||'').toLowerCase().includes(q));
    return text && (!tp || l.type === tp) && (!st || l.status === st);
  });
  currentPage = 1;
  renderTable();
}

function initPreviewMap() {
  previewMap = L.map('preview-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap);
  previewMap.setView([23.8, 121.0], 7);
}

function updatePreviewMap() {
  const lat = parseFloat(document.getElementById('l-lat').value);
  const lng = parseFloat(document.getElementById('l-lng').value);
  if (isNaN(lat) || isNaN(lng)) return;
  if (!previewMap) initPreviewMap();
  if (previewMarker) previewMarker.remove();
  previewMarker = L.marker([lat, lng]).addTo(previewMap);
  previewMap.setView([lat, lng], 14);
}

function openNewModal() {
  document.getElementById('loc-id').value = '';
  document.getElementById('loc-modal-title').textContent = t('map.new');
  ['name','name-en','address','address-en','phone','hours','hours-en','lat','lng'].forEach(f => {
    const el = document.getElementById('l-'+f); if (el) el.value = '';
  });
  document.getElementById('l-type').value   = '';
  document.getElementById('l-status').value = 'active';
  locPhotos = [];
  renderLocPhotos();
  openModal('loc-modal');
  setTimeout(() => {
    if (!previewMap) initPreviewMap();
    previewMap.invalidateSize();
    previewMap.setView([23.8, 121.0], 7);
    if (previewMarker) { previewMarker.remove(); previewMarker = null; }
  }, 100);
}

async function editLoc(id) {
  const l = await DB.getById('map_locations', id);
  if (!l) return;
  document.getElementById('loc-id').value       = l.id;
  document.getElementById('loc-modal-title').textContent = t('map.edit');
  document.getElementById('l-name').value       = l.name || '';
  document.getElementById('l-name-en').value    = l.name_en || '';
  document.getElementById('l-type').value       = l.type || '';
  document.getElementById('l-status').value     = l.status || 'active';
  document.getElementById('l-address').value    = l.address || '';
  document.getElementById('l-address-en').value = l.address_en || '';
  document.getElementById('l-phone').value      = l.phone || '';
  document.getElementById('l-hours').value      = l.hours || '';
  document.getElementById('l-hours-en').value   = l.hours_en || '';
  document.getElementById('l-lat').value        = l.lat || '';
  document.getElementById('l-lng').value        = l.lng || '';
  locPhotos = Array.isArray(l.photos) ? [...l.photos] : [];
  renderLocPhotos();
  openModal('loc-modal');
  setTimeout(() => {
    if (!previewMap) initPreviewMap();
    previewMap.invalidateSize();
    updatePreviewMap();
  }, 100);
}

async function deleteLoc(id) {
  const l = await DB.getById('map_locations', id);
  if (!l) return;
  confirmAction(t('msg.confirm_del_title'), `${l.name} — ${t('msg.confirm_del_text')}`, async () => {
    const ok = await DB.delete('map_locations', id);
    if (!ok) return;
    allLocs = await DB.getAll('map_locations');
    renderStats();
    applyFilter();
    showToast(t('msg.deleted'), 'success');
  });
}

document.getElementById('btn-save-loc').addEventListener('click', async () => {
  const id = document.getElementById('loc-id').value || null;
  const data = {
    name:       document.getElementById('l-name').value.trim(),
    name_en:    document.getElementById('l-name-en').value.trim(),
    type:       document.getElementById('l-type').value,
    status:     document.getElementById('l-status').value,
    address:    document.getElementById('l-address').value.trim(),
    address_en: document.getElementById('l-address-en').value.trim(),
    phone:      document.getElementById('l-phone').value.trim(),
    hours:      document.getElementById('l-hours').value.trim(),
    hours_en:   document.getElementById('l-hours-en').value.trim(),
    lat:        parseFloat(document.getElementById('l-lat').value) || null,
    lng:        parseFloat(document.getElementById('l-lng').value) || null,
    photos:     [...locPhotos],
  };
  if (!data.name) { showToast(t('msg.save_fail'), 'error'); return; }
  if (!data.type) { showToast(t('msg.save_fail'), 'error'); return; }
  const btn = document.getElementById('btn-save-loc');
  btn.disabled = true;
  const result = id
    ? await DB.update('map_locations', id, data)
    : await DB.insert('map_locations', data);
  btn.disabled = false;
  if (!result) return;
  showToast(id ? t('msg.updated') : t('msg.created'), 'success');
  closeModal('loc-modal');
  allLocs = await DB.getAll('map_locations');
  renderStats();
  applyFilter();
});

document.getElementById('btn-new-loc').addEventListener('click', openNewModal);
document.getElementById('search-locs').addEventListener('input', applyFilter);
document.getElementById('filter-loctype').addEventListener('change', applyFilter);
document.getElementById('filter-locstatus').addEventListener('change', applyFilter);

document.addEventListener('DOMContentLoaded', async () => {
  const user = await Auth.get();
  if (!user) return;
  allLocs = await DB.getAll('map_locations');
  filteredLocs = allLocs;
  renderStats();
  renderTable();
  if (new URLSearchParams(location.search).get('action') === 'new') openNewModal();
});
document.addEventListener('admin-lang-changed', () => { renderStats(); renderTable(); });
</script>
</body>
</html>
