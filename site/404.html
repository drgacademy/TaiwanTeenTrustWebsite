<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找不到頁面 — Taiwan Teen Trust</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background: #fff;
      color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { margin-bottom: 2.5rem; }
    .code {
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(90deg, #ff3b3b 0%, #ff8c00 20%, #ffd600 40%, #00c95d 60%, #0099ff 80%, #7c3aff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700;
      margin-top: 1rem;
      margin-bottom: .6rem;
    }
    p { color: #666; font-size: 1rem; margin-bottom: 2rem; }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #0a0a0a;
      color: #fff;
      padding: .75rem 2rem;
      border-radius: 100px;
      font-weight: 600;
      font-size: .9rem;
      text-decoration: none;
      transition: opacity .2s;
    }
    a.btn:hover { opacity: .8; }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 120 130" fill="none" width="48" height="52">
      <path d="M60 8 L108 90 L12 90 Z" stroke="#2ECAD4" stroke-width="7" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <path d="M60 40 L90 90 L30 90 Z" stroke="#2ECAD4" stroke-width="7" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <line x1="60" y1="90" x2="60" y2="122" stroke="#2ECAD4" stroke-width="7" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="code">404</div>
  <h1>找不到這個頁面</h1>
  <p>你可能輸入了錯誤的網址，或這個頁面已經移除。</p>
  <a class="btn" href="/">← 回到首頁</a>
</body>
</html>
