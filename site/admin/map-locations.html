<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="../assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="css/admin.css?v=5" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #preview-map { height: 200px; border-radius: .4rem; overflow: hidden; margin-top: .5rem; }
    .leaflet-tile-pane { filter: brightness(.75) saturate(.6) hue-rotate(180deg) invert(1); }
    .leaflet-container { background: #111; }
    .leaflet-control-zoom a { background: #1a1a1a !important; color: #f0f0f0 !important; border-color: rgba(255,255,255,.1) !important; }
    .needs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: .5rem; margin-bottom: 1rem; }
    .need-btn { padding: .4rem .6rem; border: 1px solid var(--border); border-radius: .3rem; background: transparent; color: var(--text); cursor: pointer; font-size: .8rem; transition: all 0.2s; }
    .need-btn:hover { background: rgba(255,255,255,.05); }
    .need-btn.level-urgent { background: #fecaca; color: #7f1d1d; border-color: #dc2626; }
    .need-btn.level-normal { background: #bfdbfe; color: #1e40af; border-color: #3b82f6; }
    .need-btn.level-none { background: transparent; }
    .needs-section { border-top: 1px solid var(--border); padding-top: 1.25rem; margin-top: 1.25rem; }
  </style>
</head>

  <div class="admin-main">
    <div class="admin-topbar">

      <div class="topbar-actions">
        <a href="../projects/stray-aid-map.html" target="_blank" class="btn btn--outline btn--sm">Stray Aid Map</a>
        <button class="btn btn--primary btn--sm" id="btn-new-loc">

            <div class="search-input">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

          <table>

<!-- Modal -->
<div class="modal-backdrop" id="loc-modal">
  <div class="modal modal--lg">
    <div class="modal__header">
      <div class="modal__title" id="loc-modal-title">新增中心</div>
      <button class="modal__close" data-close-modal>✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="loc-id" />
      <div class="field-row">
        <div class="field">
          <label class="field-label">中文名稱 *</label>
          <input class="field-input" id="l-name" placeholder="臺北市動物之家" required />
        </div>
        <div class="field">
          <label class="field-label">英文名稱</label>
          <input class="field-input" id="l-name-en" placeholder="Taipei Animal Shelter" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">地址（中）*</label>
          <input class="field-input" id="l-address" placeholder="台北市北投區立農街二段350號" required />
        </div>
        <div class="field">
          <label class="field-label">地址（英）</label>
          <input class="field-input" id="l-address-en" placeholder="350 Linong St. Sec.2, Beitou, Taipei" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">電話</label>
          <input class="field-input" id="l-phone" placeholder="02-2858-3700" />
        </div>
        <div class="field">
          <label class="field-label">營業時間（中）</label>
          <input class="field-input" id="l-hours" placeholder="週二–週日 09:00–17:00" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">營業時間（英）</label>
        <input class="field-input" id="l-hours-en" placeholder="Tue–Sun 09:00–17:00" />
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">緯度（Lat） *</label>
          <input class="field-input" id="l-lat" placeholder="25.1306" type="number" step="0.0001" oninput="updatePreviewMap()" required />
        </div>
        <div class="field">
          <label class="field-label">經度（Lng） *</label>
          <input class="field-input" id="l-lng" placeholder="121.4984" type="number" step="0.0001" oninput="updatePreviewMap()" required />
        </div>
      </div>
      <div class="field">
        <label class="field-label">地圖預覽</label>
        <div id="preview-map"></div>
        <div class="field-hint">→ <a href="https://www.google.com/maps" target="_blank" style="color:var(--accent)">Google Maps</a></div>
      </div>

      <div class="field">
        <label class="field-label">中心主圖</label>
        <div style="display:flex;gap:1rem;align-items:flex-start">
          <div style="flex:1">
            <input type="file" id="loc-image-input" accept="image/*" style="display:none" />
            <button type="button" class="btn btn--outline btn--sm" onclick="document.getElementById('loc-image-input').click()">選擇圖片</button>
            <div id="loc-image-preview" style="margin-top:.5rem;border-radius:.3rem;overflow:hidden;max-width:200px;max-height:150px"></div>
          </div>
        </div>
        <input type="hidden" id="l-image-url" />
      </div>

      <div class="needs-section">
        <label class="field-label">飼料存量（週） *</label>
        <input class="field-input" id="l-food-weeks" type="number" step="0.1" placeholder="1.5" required />
        <div class="field-hint">數字越大 = 糧食充足；0-2週 = 偏低；2週以下 = 緊急缺糧</div>

        <label class="field-label" style="margin-top:1.5rem;display:block">缺乏物資／資金</label>
        <div style="color:var(--text-3);font-size:.78rem;margin-bottom:.75rem">點選按鈕切換狀態：無 → 一般缺乏（藍） → 急需（紅） → 無</div>
        <div class="needs-grid" id="needs-buttons"></div>

        <label class="field-label" style="margin-top:1rem;display:block">其他物資／說明（自由輸入）</label>
        <textarea class="field-input" id="l-custom-needs" placeholder="例：尋求短期志工支援、醫療器材捐贈…" style="min-height:80px;resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--outline" data-close-modal>取消</button>
      <button class="btn btn--primary" id="btn-save-loc">儲存</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js?v=6"></script>
<script>
let allLocs = [], filteredLocs = [];
const PAGE_SIZE = 10;
let currentPage = 1;
let previewMap, previewMarker;

// 預設物資清單
const PRESET_NEEDS = [
  { key: 'dry_food',  label_zh: '乾飼料',     label_en: 'Dry food' },
  { key: 'canned',    label_zh: '罐頭食品',   label_en: 'Canned food' },
  { key: 'medical',   label_zh: '醫療費補助', label_en: 'Medical funding' },
  { key: 'surgery',   label_zh: '手術費補助', label_en: 'Surgery funding' },
  { key: 'cleaning',  label_zh: '清潔用品',   label_en: 'Cleaning supplies' },
  { key: 'volunteers',label_zh: '志工',       label_en: 'Volunteers' },
  { key: 'donations', label_zh: '長期捐款',   label_en: 'Regular donations' }
];

let currentNeeds = [];

function renderNeedsButtons() {
  const html = PRESET_NEEDS.map(p => {
    const curr = currentNeeds.find(n => n.key === p.key);
    const level = curr ? curr.level : 'none';
    return `<button type="button" class="need-btn level-${level}" data-key="${p.key}" onclick="cycleNeedLevel('${p.key}')">${p.label_zh}</button>`;
  }).join('');
  document.getElementById('needs-buttons').innerHTML = html;
}

function cycleNeedLevel(key) {
  const idx = currentNeeds.findIndex(n => n.key === key);
  if (idx === -1) {
    currentNeeds.push({ key, level: 'normal' });
  } else {
    const levels = ['normal', 'urgent', 'none'];
    const curr = currentNeeds[idx].level || 'none';
    const nextIdx = levels.indexOf(curr) + 1;
    const nextLevel = levels[nextIdx % 3];
    if (nextLevel === 'none') {
      currentNeeds.splice(idx, 1);
    } else {
      currentNeeds[idx].level = nextLevel;
    }
  }
  renderNeedsButtons();
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredLocs.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('locs-tbody');
  const tEdit = '編輯';
  const tDel = '刪除';

  if (filteredLocs.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-state__icon">🏠</div><div class="empty-state__title">尚無中心</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = page.map(l => `
    <tr>
      <td><strong>${l.name}</strong><br><span style="font-size:.75rem;color:var(--text-3)">${l.name_en || '—'}</span></td>
      <td style="font-size:.8rem;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.address || '—'}</td>
      <td class="td-mono">${l.phone || '—'}</td>
      <td>
        <span style="font-size:.85rem;color:${l.food_weeks < 2 ? '#ef4444' : l.food_weeks < 4 ? '#f59e0b' : '#22c55e'}">${l.food_weeks || '—'} 週</span>
      </td>
      <td><div class="td-actions">
        <button class="btn btn--ghost btn--sm" onclick="editLoc('${l.id}')">${tEdit}</button>
        <button class="btn btn--danger-ghost btn--sm" onclick="deleteLoc('${l.id}')">${tDel}</button>
      </div></td>
    </tr>`).join('');

  document.getElementById('locs-count').textContent = `${filteredLocs.length} 個中心`;
  const total = Math.ceil(filteredLocs.length / PAGE_SIZE);
  document.getElementById('locs-pages').innerHTML = total <= 1 ? '' :
    Array.from({length:total},(_,i)=>`<button class="page-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}

function goPage(n) { currentPage = n; renderTable(); }

function applyFilter() {
  const q = document.getElementById('search-locs').value.trim().toLowerCase();
  filteredLocs = allLocs.filter(l => {
    const text = !q || [l.name, l.name_en, l.address].some(f => (f||'').toLowerCase().includes(q));
    return text;
  });
  currentPage = 1;
  renderTable();
}

function initPreviewMap() {
  if (previewMap) return;
  previewMap = L.map('preview-map', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap);
  previewMap.setView([23.8, 121.0], 7);
}

function updatePreviewMap() {
  const lat = parseFloat(document.getElementById('l-lat').value);
  const lng = parseFloat(document.getElementById('l-lng').value);
  if (isNaN(lat) || isNaN(lng)) return;
  if (!previewMap) initPreviewMap();
  if (previewMarker) previewMarker.remove();
  previewMarker = L.marker([lat, lng]).addTo(previewMap);
  previewMap.setView([lat, lng], 14);
}

function openNewModal() {
  document.getElementById('loc-id').value = '';
  document.getElementById('loc-modal-title').textContent = '新增中心';
  ['name','name-en','address','address-en','phone','hours','hours-en','lat','lng','food-weeks','custom-needs'].forEach(f => {
    const el = document.getElementById('l-'+f); if (el) el.value = '';
  });
  document.getElementById('l-image-url').value = '';
  document.getElementById('loc-image-preview').innerHTML = '';
  currentNeeds = [];
  renderNeedsButtons();
  openModal('loc-modal');
  setTimeout(() => {
    initPreviewMap();
    previewMap.invalidateSize();
    previewMap.setView([23.8, 121.0], 7);
    if (previewMarker) { previewMarker.remove(); previewMarker = null; }
  }, 100);
}

async function editLoc(id) {
  const l = await DB.getById('map_locations', id);
  if (!l) return;
  document.getElementById('loc-id').value = l.id;
  document.getElementById('loc-modal-title').textContent = '編輯中心';
  document.getElementById('l-name').value = l.name || '';
  document.getElementById('l-name-en').value = l.name_en || '';
  document.getElementById('l-address').value = l.address || '';
  document.getElementById('l-address-en').value = l.address_en || '';
  document.getElementById('l-phone').value = l.phone || '';
  document.getElementById('l-hours').value = l.hours || '';
  document.getElementById('l-hours-en').value = l.hours_en || '';
  document.getElementById('l-lat').value = l.lat || '';
  document.getElementById('l-lng').value = l.lng || '';
  document.getElementById('l-food-weeks').value = l.food_weeks || '';
  document.getElementById('l-image-url').value = l.image_url || '';
  document.getElementById('l-custom-needs').value = l.custom_needs || '';
  if (l.image_url) {
    document.getElementById('loc-image-preview').innerHTML = `<img src="${l.image_url}" style="width:100%;height:100%;object-fit:cover">`;
  } else {
    document.getElementById('loc-image-preview').innerHTML = '';
  }
  currentNeeds = Array.isArray(l.needs) ? JSON.parse(JSON.stringify(l.needs)) : [];
  renderNeedsButtons();
  openModal('loc-modal');
  setTimeout(() => {
    initPreviewMap();
    previewMap.invalidateSize();
    updatePreviewMap();
  }, 100);
}

async function deleteLoc(id) {
  const l = await DB.getById('map_locations', id);
  if (!l) return;
  if (confirm(`確認刪除「${l.name}」？此動作無法復原。`)) {
    const ok = await DB.delete('map_locations', id);
    if (!ok) return;
    allLocs = await DB.getAll('map_locations');
    applyFilter();
    showToast('已刪除', 'success');
  }
}

document.getElementById('loc-image-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const url = await uploadToMedia(file, 'map_locations', { maxW: 800, maxH: 600, quality: 0.85 });
  if (url) {
    document.getElementById('l-image-url').value = url;
    document.getElementById('loc-image-preview').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
  }
  e.target.value = '';
});

document.getElementById('btn-save-loc').addEventListener('click', async () => {
  const id = document.getElementById('loc-id').value || null;
  const data = {
    name:        document.getElementById('l-name').value.trim(),
    name_en:     document.getElementById('l-name-en').value.trim(),
    type:        'shelter',
    status:      'active',
    address:     document.getElementById('l-address').value.trim(),
    address_en:  document.getElementById('l-address-en').value.trim(),
    phone:       document.getElementById('l-phone').value.trim(),
    hours:       document.getElementById('l-hours').value.trim(),
    hours_en:    document.getElementById('l-hours-en').value.trim(),
    lat:         parseFloat(document.getElementById('l-lat').value) || null,
    lng:         parseFloat(document.getElementById('l-lng').value) || null,
    image_url:   document.getElementById('l-image-url').value || null,
    food_weeks:  parseFloat(document.getElementById('l-food-weeks').value) || null,
    needs:       currentNeeds,
    custom_needs:document.getElementById('l-custom-needs').value.trim() || null
  };
  if (!data.name || !data.address || isNaN(data.lat) || isNaN(data.lng) || !data.food_weeks) {
    showToast('請填入必填欄位：名稱、地址、座標、飼料週數', 'error');
    return;
  }
  const btn = document.getElementById('btn-save-loc');
  btn.disabled = true;
  const result = id
    ? await DB.update('map_locations', id, data)
    : await DB.insert('map_locations', data);
  btn.disabled = false;
  if (!result) return;
  showToast(id ? '已更新' : '已新增', 'success');
  closeModal('loc-modal');
  allLocs = await DB.getAll('map_locations');
  applyFilter();
});

document.getElementById('btn-new-loc').addEventListener('click', openNewModal);
document.getElementById('search-locs').addEventListener('input', applyFilter);

document.addEventListener('DOMContentLoaded', async () => {
  const user = await Auth.get();
  if (!user) return;
  allLocs = await DB.getAll('map_locations');
  filteredLocs = allLocs;
  renderTable();
  if (new URLSearchParams(location.search).get('action') === 'new') openNewModal();
});
</script>
</body>
</html>
