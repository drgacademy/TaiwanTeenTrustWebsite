<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-title-key="nav.projects">TTT Admin — 專案管理</title>
  <link rel="icon" href="../assets/favicon.png" type="image/png" />
  <link rel="stylesheet" href="css/admin.css?v=5" />
</head>
<body>

<div class="admin-layout">
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-brand">
      <img src="../assets/logo-real.png" alt="TTT" style="width:28px;height:28px;border-radius:7px;object-fit:cover;object-position:left center;flex-shrink:0">
      <div><div class="sidebar-brand-text" data-i18n="brand.name">TTT Admin</div><div class="sidebar-brand-sub" data-i18n="brand.sub">管理後台</div></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label" data-i18n="nav.main">主選單</div>
      <a href="dashboard.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><span data-i18n="nav.dashboard">儀表板</span></a>
      <a href="members.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span data-i18n="nav.members">團隊成員</span></a>
      <a href="projects.html" class="sidebar-link active"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span data-i18n="nav.projects">專案管理</span></a>
      <a href="blog.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span data-i18n="nav.blog">部落格文章</span></a>
      <a href="map-locations.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span data-i18n="nav.map">地圖資料點</span></a>
      <a href="users.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><path d="M18 8v6"/><path d="M21 11h-6"/></svg><span data-i18n="nav.users">管理員帳號</span></a>
      <a href="settings.html" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span data-i18n="nav.settings">網站設定</span></a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label" data-i18n="nav.system">系統</div>
      <a href="../index.html" target="_blank" class="sidebar-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span data-i18n="nav.preview">前台預覽</span></a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-avatar">A</div><div><div class="sidebar-user-name">admin</div><div class="sidebar-user-role" data-i18n="user.role.admin">管理員</div></div></div>
      <button class="btn-logout" data-i18n="btn.logout">登出</button>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-breadcrumb"><a href="dashboard.html" data-i18n="common.home">首頁</a><span>/</span><span style="color:var(--text)" data-i18n="nav.projects">專案管理</span></div>
      <div class="topbar-actions">
        <button class="btn btn--primary btn--sm" id="btn-new-project">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="projects.new">新增專案</span>
        </button>
      </div>
    </div>

    <div class="admin-content">
      <div class="panel">
        <div class="panel__header">
          <div class="panel__title" data-i18n="projects.title">所有專案</div>
          <div class="panel__toolbar">
            <div class="search-input">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="search-projects" data-i18n-ph="projects.search.ph" placeholder="搜尋專案名稱…" />
            </div>
            <select class="select-input" id="filter-cat">
              <option value="" data-i18n="projects.filter.cat">所有類別</option>
              <option value="animals">動物</option>
              <option value="advocacy">倡議</option>
              <option value="research">研究</option>
              <option value="education">教育</option>
            </select>
            <select class="select-input" id="filter-pstatus">
              <option value="" data-i18n="projects.filter.status">所有狀態</option>
              <option value="active" data-i18n="projects.status.active">進行中</option>
              <option value="completed">已完成</option>
              <option value="planned">規劃中</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="projects.col.title">專案名稱</th>
                <th>Slug</th>
                <th data-i18n="projects.col.category">類別</th>
                <th data-i18n="projects.col.status">狀態</th>
                <th>Year</th>
                <th data-i18n="projects.col.updated">最後更新</th>
                <th style="text-align:right" data-i18n="projects.col.actions">操作</th>
              </tr>
            </thead>
            <tbody id="projects-tbody"></tbody>
          </table>
        </div>
        <div class="pagination">
          <div id="projects-count" style="color:var(--text-3);font-size:.75rem"></div>
          <div class="pagination__pages" id="projects-pages"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="project-modal">
  <div class="modal modal--lg">
    <div class="modal__header">
      <div class="modal__title" id="project-modal-title" data-i18n="projects.new">新增專案</div>
      <button class="modal__close" data-close-modal>✕</button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="project-id" />
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="projects.f.title_zh">中文名稱 *</label>
          <input class="field-input" id="p-title" placeholder="Stray Aid Map" required />
        </div>
        <div class="field">
          <label class="field-label" data-i18n="projects.f.title_en">英文名稱</label>
          <input class="field-input" id="p-title-en" placeholder="Stray Aid Map" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Slug</label>
        <input class="field-input" id="p-slug" placeholder="stray-aid-map" />
        <div class="field-hint">lowercase-with-hyphens</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label" data-i18n="projects.f.category">分類 *</label>
          <select class="field-select" id="p-category">
            <option value="">—</option>
            <option value="animals">動物</option>
            <option value="advocacy">倡議</option>
            <option value="research">研究</option>
            <option value="education">教育</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label" data-i18n="projects.f.status">狀態</label>
          <select class="field-select" id="p-status">
            <option value="active" data-i18n="projects.status.active">進行中</option>
            <option value="planned">規劃中</option>
            <option value="completed">已完成</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Year</label>
        <input class="field-input" id="p-year" placeholder="2026" />
      </div>
      <div class="field">
        <label class="field-label" data-i18n="projects.f.summary_zh">簡介（中）</label>
        <textarea class="field-textarea" id="p-summary" placeholder="專案簡介…"></textarea>
      </div>
      <div class="field">
        <label class="field-label" data-i18n="projects.f.summary_en">簡介（英）</label>
        <textarea class="field-textarea" id="p-summary-en" placeholder="Project summary…"></textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--outline" data-close-modal data-i18n="btn.cancel">取消</button>
      <button class="btn btn--primary" id="btn-save-project" data-i18n="btn.save">儲存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js?v=6"></script>
<script>
let allProjects = [], filteredProjects = [];
const PAGE_SIZE = 10;
let currentPage = 1;

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredProjects.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('projects-tbody');

  const CAT_LABEL = { animals:'動物', advocacy:'倡議', research:'研究', education:'教育' };
  const STATUS_LABEL = {
    active: t('projects.status.active'),
    completed: '已完成',
    planned: '規劃中'
  };
  const STATUS_BADGE = { active:'badge--green', completed:'badge--gray', planned:'badge--gold' };
  const tEdit = t('btn.edit');
  const tDel = t('btn.delete');

  if (filteredProjects.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state__icon">📁</div><div class="empty-state__title">—</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = page.map(p => `
    <tr>
      <td class="td-name">${p.title}</td>
      <td class="td-mono" style="font-size:.72rem;color:var(--text-3)">${p.slug || '—'}</td>
      <td>${p.category ? `<span class="badge badge--cyan">${CAT_LABEL[p.category]||p.category}</span>` : '—'}</td>
      <td><span class="badge ${STATUS_BADGE[p.status]||'badge--gray'}">${STATUS_LABEL[p.status]||p.status}</span></td>
      <td>${p.year || '—'}</td>
      <td style="color:var(--text-3);font-size:.75rem">${fmtDate(p.updated_at)}</td>
      <td><div class="td-actions">
        <button class="btn btn--ghost btn--sm" onclick="editProject('${p.id}')">${tEdit}</button>
        <button class="btn btn--danger-ghost btn--sm" onclick="deleteProject('${p.id}')">${tDel}</button>
      </div></td>
    </tr>`).join('');

  document.getElementById('projects-count').textContent = `${filteredProjects.length}`;
  const total = Math.ceil(filteredProjects.length / PAGE_SIZE);
  const pages = document.getElementById('projects-pages');
  pages.innerHTML = total <= 1 ? '' : Array.from({length:total},(_,i)=>
    `<button class="page-btn${i+1===currentPage?' active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');
}

function goPage(n) { currentPage = n; renderTable(); }

function applyFilter() {
  const q   = document.getElementById('search-projects').value.trim().toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const st  = document.getElementById('filter-pstatus').value;
  filteredProjects = allProjects.filter(p => {
    const text = !q || [p.title, p.title_en, p.slug].some(f => (f||'').toLowerCase().includes(q));
    return text && (!cat || p.category === cat) && (!st || p.status === st);
  });
  currentPage = 1;
  renderTable();
}

function openNewModal() {
  document.getElementById('project-id').value = '';
  document.getElementById('project-modal-title').textContent = t('projects.new');
  ['title','title-en','slug','year','summary','summary-en'].forEach(f => { const el = document.getElementById('p-'+f); if (el) el.value = ''; });
  document.getElementById('p-category').value = '';
  document.getElementById('p-status').value = 'active';
  openModal('project-modal');
}

async function editProject(id) {
  const p = await DB.getById('projects', id);
  if (!p) return;
  document.getElementById('project-id').value   = p.id;
  document.getElementById('project-modal-title').textContent = t('projects.edit');
  document.getElementById('p-title').value      = p.title || '';
  document.getElementById('p-title-en').value   = p.title_en || '';
  document.getElementById('p-slug').value       = p.slug || '';
  document.getElementById('p-category').value   = p.category || '';
  document.getElementById('p-status').value     = p.status || 'active';
  document.getElementById('p-year').value       = p.year || '';
  document.getElementById('p-summary').value    = p.summary || '';
  document.getElementById('p-summary-en').value = p.summary_en || '';
  openModal('project-modal');
}

async function deleteProject(id) {
  const p = await DB.getById('projects', id);
  if (!p) return;
  confirmAction(t('msg.confirm_del_title'), `${p.title} — ${t('msg.confirm_del_text')}`, async () => {
    const ok = await DB.delete('projects', id);
    if (!ok) return;
    allProjects = await DB.getAll('projects');
    applyFilter();
    showToast(t('msg.deleted'), 'success');
  });
}

document.getElementById('btn-save-project').addEventListener('click', async () => {
  const id = document.getElementById('project-id').value || null;
  const data = {
    title:      document.getElementById('p-title').value.trim(),
    title_en:   document.getElementById('p-title-en').value.trim(),
    slug:       document.getElementById('p-slug').value.trim(),
    category:   document.getElementById('p-category').value,
    status:     document.getElementById('p-status').value,
    year:       document.getElementById('p-year').value.trim(),
    summary:    document.getElementById('p-summary').value.trim(),
    summary_en: document.getElementById('p-summary-en').value.trim(),
  };
  if (!data.title) { showToast(t('msg.save_fail'), 'error'); return; }
  const btn = document.getElementById('btn-save-project');
  btn.disabled = true;
  const result = id
    ? await DB.update('projects', id, data)
    : await DB.insert('projects', data);
  btn.disabled = false;
  if (!result) return;
  showToast(id ? t('msg.updated') : t('msg.created'), 'success');
  closeModal('project-modal');
  allProjects = await DB.getAll('projects');
  applyFilter();
});

document.getElementById('btn-new-project').addEventListener('click', openNewModal);
document.getElementById('search-projects').addEventListener('input', applyFilter);
document.getElementById('filter-cat').addEventListener('change', applyFilter);
document.getElementById('filter-pstatus').addEventListener('change', applyFilter);

document.addEventListener('DOMContentLoaded', async () => {
  const user = await Auth.get();
  if (!user) return;
  allProjects = await DB.getAll('projects');
  filteredProjects = allProjects;
  renderTable();
  if (new URLSearchParams(location.search).get('action') === 'new') openNewModal();
});
document.addEventListener('admin-lang-changed', () => renderTable());
</script>
</body>
</html>
