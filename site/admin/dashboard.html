<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儀表板 — TTT Admin</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-brand">
      <svg viewBox="0 0 120 130" fill="none" width="24" height="26">
        <path d="M60 8 L108 90 L12 90 Z" stroke="#2ECAD4" stroke-width="7" fill="none" stroke-linejoin="round"/>
        <path d="M60 40 L90 90 L30 90 Z" stroke="#2ECAD4" stroke-width="7" fill="none" stroke-linejoin="round"/>
        <line x1="60" y1="90" x2="60" y2="122" stroke="#2ECAD4" stroke-width="7" stroke-linecap="round"/>
      </svg>
      <div>
        <div class="sidebar-brand-text">TTT Admin</div>
        <div class="sidebar-brand-sub">管理後台</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">主選單</div>
      <a href="dashboard.html" class="sidebar-link active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        儀表板
      </a>
      <a href="members.html" class="sidebar-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        團隊成員
      </a>
      <a href="projects.html" class="sidebar-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        專案管理
      </a>
      <a href="blog.html" class="sidebar-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        部落格文章
      </a>
      <a href="map-locations.html" class="sidebar-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        地圖資料點
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">系統</div>
      <a href="../index.html" target="_blank" class="sidebar-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        前台預覽
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar">A</div>
        <div>
          <div class="sidebar-user-name">admin@taiwanteentrust.org</div>
          <div class="sidebar-user-role">管理員</div>
        </div>
      </div>
      <button class="btn-logout">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-breadcrumb">
        <span>首頁</span>
        <span>/</span>
        <span style="color:var(--text)">儀表板</span>
      </div>
      <div class="topbar-actions">
        <a href="../index.html" target="_blank" class="btn btn--outline btn--sm">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          前台
        </a>
      </div>
    </div>

    <div class="admin-content">
      <h2 style="font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:1.5rem">
        總覽
      </h2>

      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-card__icon">👥</div>
          <div class="stat-card__value" id="stat-members">—</div>
          <div class="stat-card__label">團隊成員</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📁</div>
          <div class="stat-card__value" id="stat-projects">—</div>
          <div class="stat-card__label">進行中專案</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📝</div>
          <div class="stat-card__value" id="stat-posts">—</div>
          <div class="stat-card__label">已發布文章</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">📍</div>
          <div class="stat-card__value" id="stat-locations">—</div>
          <div class="stat-card__label">地圖資料點</div>
        </div>
      </div>

      <!-- Two-column panels -->
      <div class="dash-grid">

        <!-- Recent activity -->
        <div class="panel">
          <div class="panel__header">
            <div class="panel__title">最新動態</div>
          </div>
          <div id="activity-list"></div>
        </div>

        <!-- Quick actions -->
        <div class="panel">
          <div class="panel__header">
            <div class="panel__title">快速操作</div>
          </div>
          <div style="padding:1.25rem;display:flex;flex-direction:column;gap:.6rem">
            <a href="members.html?action=new" class="btn btn--outline" style="justify-content:flex-start;gap:.75rem">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              新增團隊成員
            </a>
            <a href="projects.html?action=new" class="btn btn--outline" style="justify-content:flex-start;gap:.75rem">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              新增專案
            </a>
            <a href="blog.html?action=new" class="btn btn--outline" style="justify-content:flex-start;gap:.75rem">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              撰寫新文章
            </a>
            <a href="map-locations.html?action=new" class="btn btn--outline" style="justify-content:flex-start;gap:.75rem">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              新增地圖資料點
            </a>
            <hr style="border-color:var(--border);margin:.25rem 0" />
            <a href="../projects/stray-aid-map.html" target="_blank" class="btn btn--ghost" style="justify-content:flex-start;gap:.75rem;font-size:.78rem">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              預覽 Stray Aid Map
            </a>
          </div>
        </div>

      </div>

      <!-- Module shortcut cards -->
      <div class="dash-grid--3 dash-grid" style="margin-top:1rem">
        <a href="members.html" class="panel" style="padding:1.25rem;text-decoration:none;transition:border-color .2s" onmouseenter="this.style.borderColor='rgba(46,202,212,.3)'" onmouseleave="this.style.borderColor=''">
          <div style="font-size:1.5rem;margin-bottom:.75rem">👥</div>
          <div style="font-weight:700;margin-bottom:.3rem">團隊成員</div>
          <div style="font-size:.78rem;color:var(--text-2)">新增、編輯、停用成員帳號與個人資料。</div>
        </a>
        <a href="projects.html" class="panel" style="padding:1.25rem;text-decoration:none;transition:border-color .2s" onmouseenter="this.style.borderColor='rgba(46,202,212,.3)'" onmouseleave="this.style.borderColor=''">
          <div style="font-size:1.5rem;margin-bottom:.75rem">📁</div>
          <div style="font-weight:700;margin-bottom:.3rem">專案管理</div>
          <div style="font-size:.78rem;color:var(--text-2)">管理專案狀態、分類與展示資訊。</div>
        </a>
        <a href="blog.html" class="panel" style="padding:1.25rem;text-decoration:none;transition:border-color .2s" onmouseenter="this.style.borderColor='rgba(46,202,212,.3)'" onmouseleave="this.style.borderColor=''">
          <div style="font-size:1.5rem;margin-bottom:.75rem">📝</div>
          <div style="font-weight:700;margin-bottom:.3rem">部落格</div>
          <div style="font-size:.78rem;color:var(--text-2)">發布、編輯與管理所有文章。</div>
        </a>
        <a href="map-locations.html" class="panel" style="padding:1.25rem;text-decoration:none;transition:border-color .2s" onmouseenter="this.style.borderColor='rgba(46,202,212,.3)'" onmouseleave="this.style.borderColor=''">
          <div style="font-size:1.5rem;margin-bottom:.75rem">📍</div>
          <div style="font-weight:700;margin-bottom:.3rem">地圖資料點</div>
          <div style="font-size:.78rem;color:var(--text-2)">管理流浪動物地圖上的收容所、醫院等資料。</div>
        </a>
      </div>

    </div>
  </div>
</div>

<script src="js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  /* Stats */
  const members   = DB.getAll('members');
  const projects  = DB.getAll('projects');
  const posts     = DB.getAll('posts');
  const locations = DB.getAll('map_locations');

  document.getElementById('stat-members').textContent   = members.length;
  document.getElementById('stat-projects').textContent  = projects.filter(p => p.status === 'active').length;
  document.getElementById('stat-posts').textContent     = posts.filter(p => p.status === 'published').length;
  document.getElementById('stat-locations').textContent = locations.length;

  /* Recent activity (derived from updated_at) */
  const all = [
    ...members.map(r => ({ type: 'member', name: r.name, time: r.updated_at, color: 'var(--accent)' })),
    ...projects.map(r => ({ type: 'project', name: r.title, time: r.updated_at, color: '#7fb285' })),
    ...posts.map(r => ({ type: 'post', name: r.title, time: r.updated_at, color: '#c9a96e' })),
    ...locations.map(r => ({ type: 'location', name: r.name, time: r.updated_at, color: '#e07070' })),
  ].sort((a, b) => new Date(b.time) - new Date(a.time)).slice(0, 8);

  const typeLabel = { member: '成員', project: '專案', post: '文章', location: '地點' };
  const actList = document.getElementById('activity-list');
  if (all.length === 0) {
    actList.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-3);font-size:.8rem">尚無動態。</div>';
  } else {
    actList.innerHTML = all.map(a => `
      <div class="activity-item">
        <div class="activity-dot" style="background:${a.color}"></div>
        <div>
          <div class="activity-text"><strong>${a.name}</strong> —— ${typeLabel[a.type]}已更新</div>
          <div class="activity-time">${fmtDate(a.time)}</div>
        </div>
      </div>`).join('');
  }
});
</script>
</body>
</html>
